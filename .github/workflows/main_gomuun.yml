name: Build and deploy GoMun API to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      PORT: 8080
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      DEFAULT_USER_ID: couple

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # 3️⃣ Install dependencies (root, incluye workspaces)
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build frontend
      - name: Build web client
        run: npm run build -w apps/web

      # 5️⃣ Adjuntar SPA al backend
      - name: Prepare web assets
        run: |
          rm -rf apps/api/public
          mkdir -p apps/api/public
          cp -R apps/web/dist/* apps/api/public/
      # 6️⃣ Instalar dependencias de producción para la API
      - name: Install API production dependencies
        run: npm install --omit=dev --prefix apps/api

      # 7️⃣ Generar Prisma client
      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      # 8️⃣ Build the API (crea dist/index.js)
      - name: Build API
        run: npm run build -w apps/api

      # 9️⃣ Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A1396C7357864DD4B7BDF7504902B520 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_14B4497AD0B74752AD54A5A0F11B4C03 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_33EE12076CAA4BC9A21E95FC67CDC521 }}
      # 🔟 Set startup command in Azure
      - name: Set startup command
        uses: azure/appservice-settings@v1
        with:
          app-name: 'gomuun'
          app-settings-json: |
            [
              {
                "name": "STARTUP_COMMAND",
                "value": "node dist/index.js"
              }
            ]
      # 1️⃣1️⃣ Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gomuun'
          package: apps/api
